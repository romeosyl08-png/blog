{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Create Post</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>

    <h1>Create a new post</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Title</label>
        <input type="text" name="title">

        <label>Content</label>
        <textarea name="content"></textarea>

        <button type="submit">Publish</button>
    </form>

</body>
</html>
