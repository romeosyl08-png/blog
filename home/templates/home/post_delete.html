{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Delete Post</title>
    <link rel="stylesheet" href="{% static 'blog/style.css' %}">
</head>
<body>

    <h1>Delete post</h1>

    <p>Are you sure you want to delete this post?</p>

    <h2>{{ post.title }}</h2>
    <p>{{ post.content }}</p>

    <form method="POST">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
    </form>

    <a href="{% url 'home:post_details' post.pk %}">Cancel</a>

</body>
</html>
